name: cipherx_frontend
description: CipherX Flutter frontend (UI demo)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.5
  percent_indicator: ^4.2.2
  animations: ^2.0.6
  http: ^0.13.6
  intl: ^0.18.1
  url_launcher: ^6.2.5      # NEW: opens Email / LinkedIn links in About
  file_picker: ^6.1.1      # For APK file uploads
  dio: ^5.4.3              # For file uploads and FormData

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
